<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="sans-serif" font-size="13">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f97316"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#f8fafc" rx="8"/>

  <!-- ── Raspberry Pi box ── -->
  <rect x="20" y="20" width="480" height="310" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="36" y="44" fill="#64748b" font-size="12" font-weight="bold">Raspberry Pi (Edge Device)</text>

  <!-- Agent box -->
  <rect x="50" y="65" width="190" height="100" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="145" y="90" text-anchor="middle" fill="#1d4ed8" font-weight="bold">Agent</text>
  <text x="145" y="109" text-anchor="middle" fill="#1d4ed8" font-size="11">:9999 HTTP API</text>
  <text x="145" y="127" text-anchor="middle" fill="#1d4ed8" font-size="11">MQTT client &lt;id&gt;</text>
  <text x="145" y="145" text-anchor="middle" fill="#1d4ed8" font-size="11">subscribes: .../req</text>

  <!-- Node-RED box -->
  <rect x="290" y="65" width="190" height="100" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="385" y="90" text-anchor="middle" fill="#92400e" font-weight="bold">Node-RED</text>
  <text x="385" y="109" text-anchor="middle" fill="#92400e" font-size="11">:1880 UI + REST</text>
  <text x="385" y="127" text-anchor="middle" fill="#92400e" font-size="11">MQTT client &lt;id&gt;-nr</text>
  <text x="385" y="145" text-anchor="middle" fill="#92400e" font-size="11">publishes: .../data</text>

  <!-- Agent → Node-RED HTTP arrow -->
  <line x1="240" y1="105" x2="288" y2="105" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="264" y="99" text-anchor="middle" fill="#374151" font-size="10">HTTP</text>
  <text x="264" y="113" text-anchor="middle" fill="#374151" font-size="10">deploy</text>

  <!-- Modbus TCP Device box (right side) -->
  <rect x="600" y="100" width="175" height="110" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="687" y="125" text-anchor="middle" fill="#9d174d" font-weight="bold">Modbus Device</text>
  <text x="687" y="145" text-anchor="middle" fill="#9d174d" font-size="11">(PLC / Sensor)</text>
  <text x="687" y="165" text-anchor="middle" fill="#9d174d" font-size="11">HR0  Voltage  (V)</text>
  <text x="687" y="181" text-anchor="middle" fill="#9d174d" font-size="11">HR1  Current  (A)</text>
  <text x="687" y="197" text-anchor="middle" fill="#9d174d" font-size="11">HR2  Power    (W)</text>

  <!-- Node-RED ↔ Modbus arrow -->
  <line x1="480" y1="140" x2="598" y2="140" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="598" y1="160" x2="480" y2="160" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="539" y="135" text-anchor="middle" fill="#b91c1c" font-size="11">FC03 poll</text>
  <text x="539" y="173" text-anchor="middle" fill="#b91c1c" font-size="11">registers</text>

  <!-- Modbus label box -->
  <rect x="488" y="120" width="108" height="58" rx="4" fill="#fff1f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="542" y="137" text-anchor="middle" fill="#b91c1c" font-size="10" font-weight="bold">Modbus TCP</text>
  <text x="542" y="152" text-anchor="middle" fill="#b91c1c" font-size="10">:502</text>
  <text x="542" y="167" text-anchor="middle" fill="#b91c1c" font-size="10">every 10s</text>

  <!-- SenML encode label inside RPi -->
  <rect x="260" y="210" width="220" height="50" rx="6" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="370" y="231" text-anchor="middle" fill="#15803d" font-size="11" font-weight="bold">SenML encode</text>
  <text x="370" y="249" text-anchor="middle" fill="#15803d" font-size="11">[{bn,n:hr0,v:230},{n:hr1,v:12.5}…]</text>

  <!-- Node-RED → SenML box arrow -->
  <line x1="370" y1="165" x2="370" y2="208" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- SenML box → publish (going down out of RPi) -->
  <line x1="370" y1="260" x2="370" y2="310" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="385" y="290" fill="#c2410c" font-size="11">publish</text>

  <!-- MQTT Broker cloud box -->
  <rect x="200" y="370" width="350" height="75" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="375" y="400" text-anchor="middle" fill="#5b21b6" font-weight="bold">Magistrala Cloud MQTT</text>
  <text x="375" y="418" text-anchor="middle" fill="#5b21b6" font-size="11">m/&lt;domain&gt;/c/&lt;channel&gt;/data  (SenML)</text>
  <text x="375" y="434" text-anchor="middle" fill="#5b21b6" font-size="11">m/&lt;domain&gt;/c/&lt;channel&gt;/req   (commands)</text>

  <!-- Agent MQTT connection line -->
  <path d="M 100 165 L 100 345 L 230 345 L 230 368" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="55" y="270" fill="#1d4ed8" font-size="10">MQTT/TLS</text>
  <text x="55" y="283" fill="#1d4ed8" font-size="10">commands</text>

  <!-- Magistrala Platform box -->
  <rect x="200" y="465" width="350" height="50" rx="8" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="375" y="487" text-anchor="middle" fill="#9a3412" font-weight="bold">Magistrala Platform</text>
  <text x="375" y="505" text-anchor="middle" fill="#9a3412" font-size="11">Rule Engine  ·  Time-series DB  ·  API</text>

  <!-- Cloud → Platform arrow -->
  <line x1="375" y1="445" x2="375" y2="463" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="20" y="355" width="165" height="115" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="30" y="374" fill="#374151" font-size="11" font-weight="bold">Legend</text>
  <line x1="30" y1="390" x2="60" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="68" y="394" fill="#374151" font-size="11">HTTP (agent → NR)</text>
  <line x1="30" y1="408" x2="60" y2="408" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="68" y="412" fill="#374151" font-size="11">MQTT/TLS (agent)</text>
  <line x1="30" y1="426" x2="60" y2="426" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="68" y="430" fill="#374151" font-size="11">MQTT/TLS (NR data)</text>
  <line x1="30" y1="444" x2="60" y2="444" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="68" y="448" fill="#374151" font-size="11">Modbus TCP FC03</text>
  <line x1="30" y1="462" x2="60" y2="462" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="68" y="466" fill="#374151" font-size="11">SenML encode</text>

</svg>
